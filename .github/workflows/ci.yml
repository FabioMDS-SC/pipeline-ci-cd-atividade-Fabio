name: CI - Validar HTML

on:
  push:
    branches: [ "main" ]
    paths:
      - "site/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "site/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  validar-html:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Verificar se existe site/index.html
        run: |
          if [ ! -f site/index.html ]; then
            echo "Erro: site/index.html ausente!"
            exit 1
          fi
          echo "Sucesso: site/index.html presente!"

      - name: Validar conteúdo básico do HTML
        run: |
          grep -q "Meu primeiro deploy automatizado" site/index.html
          echo "Sucesso: conteúdo esperado encontrado!"
